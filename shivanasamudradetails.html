<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivanasamudra Falls</title>

<style>
body{font-family:Arial;margin:0;background:#e8f5e9;padding:20px}
header{background:#2e7d32;color:white;padding:15px;text-align:center}
.section{background:white;padding:15px;margin:15px 0;border-radius:10px}
button{background:#2e7d32;color:white;padding:10px;border:none;border-radius:5px;margin:5px;cursor:pointer}
.card{border:1px solid #ccc;padding:10px;margin:10px 0;border-radius:8px}
textarea,select{width:100%;padding:8px;margin-top:5px}
footer{text-align:center;background:#2e7d32;color:white;padding:10px;margin-top:20px}
</style>
</head>

<body>

<header>
<h1>Shivanasamudra Falls</h1>
</header>

<div class="section">
<h2>Ticket Fare</h2>
<p>₹30 - ₹50 (Approx)</p>
</div>

<div class="section">
<h2>Crowd Status</h2>
<p id="crowd">Click to check</p>
<button onclick="getCrowd()">Check Crowd</button>
</div>

<div class="section">
<h2>Hotels Nearby</h2>
<div id="hotels"></div>
<button onclick="getHotels()">Show Hotels</button>
</div>

<div class="section">
<h2>Essential Needs</h2>
<div id="essentials"></div>
<button onclick="getEssentials()">Show Essentials</button>
</div>

<div class="section">
<h2>Famous Food Nearby</h2>
<div id="food"></div>
<button onclick="getFood()">Show Food</button>
</div>

<div class="section">
<h2>Location</h2>
<iframe width="100%" height="300"
src="https://www.google.com/maps?q=Shivanasamudra+Falls&output=embed"></iframe>
</div>

<div class="section">
<h2>User Reviews</h2>
<select id="rating">
<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>
</select>

<textarea id="reviewText" placeholder="Write review"></textarea>
<button onclick="addReview()">Submit</button>

<div id="reviews"></div>
</div>

<footer>KA Adventure</footer>

<button id="sosBtn">🆘</button>

<style>
#sosBtn{
position:fixed;bottom:20px;right:20px;
background:red;color:white;border:none;
border-radius:50%;width:65px;height:65px;font-size:26px;
}
</style>

<script>
// Crowd
function getCrowd(){
let levels=["Low","Moderate","High","Very Busy"];
document.getElementById("crowd").innerText=
levels[Math.floor(Math.random()*4)];
}

// Navigation
function nav(lat,lon){
window.open(https://www.google.com/maps/dir/?api=1&destination=${lat},${lon});
}

// Booking
function book(){
window.open("https://www.booking.com");
}

// Hotels
function getHotels(){
document.getElementById("hotels").innerHTML=`
<div class="card">
<b>Mayura Hotel</b>
<button onclick="nav(12.30,77.00)">Navigate</button>
<button onclick="book()">Book</button>
</div>
<div class="card">
<b>River View Resort</b>
<button onclick="nav(12.31,77.01)">Navigate</button>
<button onclick="book()">Book</button>
</div>`;
}

// Essentials
function getEssentials(){
document.getElementById("essentials").innerHTML=`
<div class="card">
Hospital
<button onclick="nav(12.32,77.02)">Navigate</button>
</div>
<div class="card">
Fuel Station
<button onclick="nav(12.33,77.03)">Navigate</button>
</div>`;
}

// Food
function getFood(){
document.getElementById("food").innerHTML=`
<div class="card">
Biryani Point
<button onclick="nav(12.30,77.04)">Navigate</button>
</div>
<div class="card">
South Meals
<button onclick="nav(12.29,77.05)">Navigate</button>
</div>`;
}

// Reviews
function addReview(){
let r=document.getElementById("rating").value;
let t=document.getElementById("reviewText").value;
if(!t) return;

let list=JSON.parse(localStorage.getItem("shiv_reviews")||"[]");
list.push({r,t});
localStorage.setItem("shiv_reviews",JSON.stringify(list));
load();
}

function load(){
let list=JSON.parse(localStorage.getItem("shiv_reviews")||"[]");
document.getElementById("reviews").innerHTML=
list.map(x=><div class="card">${"★".repeat(x.r)}<br>${x.t}</div>).join("");
}
load();

// SOS
document.getElementById("sosBtn").onclick=function(){
let s1=localStorage.getItem("sos1");
let s2=localStorage.getItem("sos2");
if(!s1||!s2){alert("Add SOS numbers");return;}
navigator.geolocation.getCurrentPosition(pos=>{
let msg="Emergency Shivanasamudra https://maps.google.com/?q="+pos.coords.latitude+","+pos.coords.longitude;
window.location="sms:"+s1+"?body="+encodeURIComponent(msg);
setTimeout(()=>window.location="sms:"+s2+"?body="+encodeURIComponent(msg),3000);
});
};
</script>

</body>
</html>
