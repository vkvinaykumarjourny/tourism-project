<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivanasamudra Falls</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#e8f5e9;
  padding:20px;
}

header{
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
}

.section{
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  margin:5px;
  cursor:pointer;
}

.card{
  border:1px solid #ccc;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

textarea,select{
  width:100%;
  padding:8px;
  margin-top:5px;
}

footer{
  text-align:center;
  background:#2e7d32;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<header>
<h1>Shivanasamudra Falls</h1>
</header>

<!-- TICKET -->
<div class="section">
<h2>Entry Fee</h2>
<p>₹30 - ₹50 (Parking extra)</p>
</div>

<!-- CROWD -->
<div class="section">
<h2>Crowd Status</h2>
<p id="crowd">Click to check</p>
<button onclick="checkCrowd()">Check Crowd</button>
</div>

<!-- HOTELS -->
<div class="section">
<h2>Nearby Hotels</h2>
<div id="hotels"></div>
<button onclick="loadHotels()">Load Hotels</button>
</div>

<!-- ESSENTIALS -->
<div class="section">
<h2>Essential Needs</h2>
<div id="essentials"></div>
<button onclick="loadEssentials()">Load Essentials</button>
</div>

<!-- FOOD -->
<div class="section">
<h2>Famous Food Nearby</h2>
<div id="food"></div>
<button onclick="loadFood()">Load Food</button>
</div>

<!-- MAP -->
<div class="section">
<h2>Location</h2>
<iframe width="100%" height="300"
src="https://www.google.com/maps?q=Shivanasamudra+Falls&output=embed">
</iframe>
</div>

<!-- REVIEWS -->
<div class="section">
<h2>User Reviews</h2>

<select id="rating">
<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>
</select>

<textarea id="reviewText" placeholder="Write review"></textarea>
<button onclick="addReview()">Submit Review</button>

<div id="reviewList"></div>
</div>

<footer>KA Adventure</footer>

<!-- SOS -->
<button id="sosBtn">🆘</button>

<style>
#sosBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
color:white;
border:none;
border-radius:50%;
width:65px;
height:65px;
font-size:26px;
cursor:pointer;
}
</style>

<script>

/* ---------------- CROWD ---------------- */
function checkCrowd(){
  const levels=["Low","Moderate","High","Very Busy"];
  document.getElementById("crowd").innerText =
  levels[Math.floor(Math.random()*levels.length)];
}

/* ---------------- NAVIGATION ---------------- */
function navigate(lat,lon){
  window.open(
    "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon
  );
}

/* ---------------- BOOKING SAFE ---------------- */
function bookHotel(name){
  // Safe fallback (no broken API)
  window.open("https://www.google.com/search?q=" + name + " hotel booking");
}

/* ---------------- HOTELS ---------------- */
function loadHotels(){
  document.getElementById("hotels").innerHTML=`
  <div class="card">
    <b>Mayura Hotel</b>
    <button onclick="navigate(12.30,77.00)">Navigate</button>
    <button onclick="bookHotel('Mayura Hotel Shivanasamudra')">Book</button>
  </div>

  <div class="card">
    <b>River View Resort</b>
    <button onclick="navigate(12.31,77.01)">Navigate</button>
    <button onclick="bookHotel('River View Resort Shivanasamudra')">Book</button>
  </div>
  `;
}

/* ---------------- ESSENTIALS ---------------- */
function loadEssentials(){
  document.getElementById("essentials").innerHTML=`
  <div class="card">
    Hospital
    <button onclick="navigate(12.32,77.02)">Navigate</button>
  </div>

  <div class="card">
    Petrol Pump
    <button onclick="navigate(12.33,77.03)">Navigate</button>
  </div>

  <div class="card">
    Parking Area
    <button onclick="navigate(12.34,77.04)">Navigate</button>
  </div>
  `;
}

/* ---------------- FOOD ---------------- */
function loadFood(){
  document.getElementById("food").innerHTML=`
  <div class="card">
    South Indian Meals
    <button onclick="navigate(12.35,77.05)">Navigate</button>
  </div>

  <div class="card">
    Biryani Point
    <button onclick="navigate(12.36,77.06)">Navigate</button>
  </div>

  <div class="card">
    Coffee & Snacks
    <button onclick="navigate(12.37,77.07)">Navigate</button>
  </div>
  `;
}

/* ---------------- REVIEWS ---------------- */
function addReview(){
  let rating=document.getElementById("rating").value;
  let text=document.getElementById("reviewText").value;

  if(text.trim()===""){
    alert("Write review first");
    return;
  }

  let reviews=JSON.parse(localStorage.getItem("shiv_reviews")||"[]");
  reviews.push({rating,text});
  localStorage.setItem("shiv_reviews",JSON.stringify(reviews));

  document.getElementById("reviewText").value="";
  showReviews();
}

function showReviews(){
  let reviews=JSON.parse(localStorage.getItem("shiv_reviews")||"[]");
  document.getElementById("reviewList").innerHTML =
    reviews.map(r=>`
      <div class="card">
        ${"★".repeat(r.rating)}<br>
        ${r.text}
      </div>
    `).join("");
}
showReviews();

/* ---------------- SOS (SAFE VERSION) ---------------- */
document.getElementById("sosBtn").onclick=function(){

  let s1=localStorage.getItem("sos1");
  let s2=localStorage.getItem("sos2");

  if(!s1 || !s2){
    alert("SOS numbers not set in login");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){

      let msg="🚨 Emergency at Shivanasamudra Falls\nhttps://maps.google.com/?q="
      +pos.coords.latitude+","+pos.coords.longitude;

      window.location="sms:"+s1+"?body="+encodeURIComponent(msg);

      setTimeout(()=>{
        window.location="sms:"+s2+"?body="+encodeURIComponent(msg);
      },3000);

    },
    function(){
      alert("Location permission denied");
    }
  );
};

</script>

</body>
</html>
