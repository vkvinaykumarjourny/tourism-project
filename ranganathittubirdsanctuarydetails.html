<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranganathittu Bird Sanctuary</title>

<style>
body{font-family:Arial;margin:0;background:#e8f5e9;padding:20px}
header{background:#1b5e20;color:white;padding:15px;text-align:center}
.section{background:white;padding:15px;margin:15px 0;border-radius:10px}
button{background:#1b5e20;color:white;padding:10px;border:none;border-radius:5px;margin:5px;cursor:pointer}
.card{border:1px solid #ccc;padding:10px;margin:10px 0;border-radius:8px}
textarea,select{width:100%;padding:8px;margin-top:5px}
footer{text-align:center;background:#1b5e20;color:white;padding:10px;margin-top:20px}
</style>
</head>

<body>

<header>
<h1>Ranganathittu Bird Sanctuary</h1>
</header>

<div class="section">
<h2>Entry Fee</h2>
<p>₹50 - ₹300 (Boat ride extra)</p>
</div>

<div class="section">
<h2>Crowd Status</h2>
<p id="crowd">Check status</p>
<button onclick="crowd()">Check Crowd</button>
</div>

<div class="section">
<h2>Hotels Nearby</h2>
<div id="hotels"></div>
<button onclick="hotels()">Load Hotels</button>
</div>

<div class="section">
<h2>Essentials</h2>
<div id="essentials"></div>
<button onclick="essentials()">Load Essentials</button>
</div>

<div class="section">
<h2>Famous Food</h2>
<div id="food"></div>
<button onclick="food()">Load Food</button>
</div>

<div class="section">
<h2>Location</h2>
<iframe width="100%" height="300"
src="https://www.google.com/maps?q=Ranganathittu+Bird+Sanctuary&output=embed"></iframe>
</div>

<div class="section">
<h2>Reviews</h2>
<select id="rating">
<option>5</option><option>4</option><option>3</option>
<option>2</option><option>1</option>
</select>
<textarea id="text"></textarea>
<button onclick="add()">Submit</button>
<div id="list"></div>
</div>

<footer>KA Adventure</footer>

<button id="sosBtn">🆘</button>

<style>
#sosBtn{
position:fixed;bottom:20px;right:20px;
background:red;color:white;border:none;
border-radius:50%;width:65px;height:65px;font-size:26px;
}
</style>

<script>

function crowd(){
let a=["Low","Medium","High","Very High"];
document.getElementById("crowd").innerText=a[Math.random()*4|0];
}

function nav(lat,lon){
window.open(https://www.google.com/maps/dir/?api=1&destination=${lat},${lon});
}

function book(){
window.open("https://www.booking.com");
}

function hotels(){
document.getElementById("hotels").innerHTML=`
<div class="card">Hotel Mayura <button onclick="nav(12.42,76.67)">Navigate</button><button onclick="book()">Book</button></div>
<div class="card">River Nest Resort <button onclick="nav(12.43,76.68)">Navigate</button><button onclick="book()">Book</button></div>`;
}

function essentials(){
document.getElementById("essentials").innerHTML=`
<div class="card">Hospital <button onclick="nav(12.44,76.69)">Navigate</button></div>
<div class="card">Parking <button onclick="nav(12.45,76.70)">Navigate</button></div>`;
}

function food(){
document.getElementById("food").innerHTML=`
<div class="card">Fish Meals <button onclick="nav(12.46,76.71)">Navigate</button></div>
<div class="card">South Meals <button onclick="nav(12.47,76.72)">Navigate</button></div>`;
}

function add(){
let r=document.getElementById("rating").value;
let t=document.getElementById("text").value;
let d=JSON.parse(localStorage.getItem("ran")||"[]");
d.push({r,t});
localStorage.setItem("ran",JSON.stringify(d));
load();
}

function load(){
let d=JSON.parse(localStorage.getItem("ran")||"[]");
document.getElementById("list").innerHTML=
d.map(x=><div class="card">${"★".repeat(x.r)}<br>${x.t}</div>).join("");
}
load();

document.getElementById("sosBtn").onclick=function(){
let s1=localStorage.getItem("sos1");
let s2=localStorage.getItem("sos2");
if(!s1||!s2){alert("SOS not set");return;}
navigator.geolocation.getCurrentPosition(p=>{
let m="Emergency Ranganathittu https://maps.google.com/?q="+p.coords.latitude+","+p.coords.longitude;
window.location="sms:"+s1+"?body="+encodeURIComponent(m);
setTimeout(()=>window.location="sms:"+s2+"?body="+encodeURIComponent(m),3000);
});
};

</script>

</body>
</html>
