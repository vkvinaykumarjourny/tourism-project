<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f3}

.container{padding:20px;max-width:900px;margin:auto}

.section{
background:white;
padding:20px;
margin:20px 0;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}

input, textarea, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:12px;
border-radius:10px;
margin:10px 0;
background:#fafafa;
}

.card img{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:8px;
margin-top:5px;
}

.badge{
padding:4px 8px;
border-radius:5px;
color:white;
font-size:12px;
}

.lost{background:#d32f2f}
.found{background:#388e3c}

.actions button{
margin-right:5px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Lost & Found</h2>

<!-- FORM -->
<div class="section">

<div class="grid">
<select id="type">
<option value="Lost">Lost</option>
<option value="Found">Found</option>
</select>

<input type="text" id="item" placeholder="Item name">
</div>

<input type="text" id="location" placeholder="Location">
<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="image">

<button onclick="addItem()">Submit</button>

</div>

<!-- SEARCH -->
<div class="section">
<input type="text" id="search" placeholder="Search items..." onkeyup="render()">
</div>

<!-- LIST -->
<div class="section">
<div id="list"></div>
</div>

</div>

<script>

/* LOGIN CHECK */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* ADD ITEM */
function addItem(){

let type = document.getElementById("type").value;
let item = document.getElementById("item").value;
let loc = document.getElementById("location").value;
let desc = document.getElementById("desc").value;
let file = document.getElementById("image").files[0];

if(!item || !loc){
alert("Fill required fields");
return;
}

let reader = new FileReader();

reader.onload = function(){

let data = JSON.parse(localStorage.getItem("lf_data") || "[]");

data.push({
id: Date.now(),
type,
item,
loc,
desc,
img: reader.result,
user: localStorage.getItem("username"),
date: new Date().toLocaleString()
});

localStorage.setItem("lf_data", JSON.stringify(data));

clearForm();
render();
};

if(file){
reader.readAsDataURL(file);
}else{
reader.onload();
}

}

/* RENDER */
function render(){

let data = JSON.parse(localStorage.getItem("lf_data") || "[]");
let search = document.getElementById("search").value.toLowerCase();

let html = "";

data.reverse().forEach(d=>{

if(!d.item.toLowerCase().includes(search)) return;

let match = data.find(m =>
m.item.toLowerCase() === d.item.toLowerCase() &&
m.type !== d.type
);

html += `
<div class="card">

<span class="badge ${d.type==='Lost'?'lost':'found'}">${d.type}</span>

<h3>${d.item}</h3>

<p><b>Location:</b> ${d.loc}</p>
<p>${d.desc}</p>

${d.img ? <img src="${d.img}"> : ""}

<p><small>${d.date}</small></p>
<p><i>By: ${d.user}</i></p>

<div class="actions">
<button onclick="contact()">📞 Contact</button>

${d.user === localStorage.getItem("username") ?
<button onclick="remove(${d.id})">🗑 Delete</button> : ""}

${match ? <div style="color:orange">⚡ Match Found!</div> : ""}
</div>

</div>
`;

});

document.getElementById("list").innerHTML = html;

}

/* DELETE */
function remove(id){
let data = JSON.parse(localStorage.getItem("lf_data") || "[]");
data = data.filter(d=>d.id!==id);
localStorage.setItem("lf_data", JSON.stringify(data));
render();
}

/* CONTACT */
function contact(){
let n1 = localStorage.getItem("sos1");
let n2 = localStorage.getItem("sos2");

window.location.href =
sms:${n1},${n2}?body=Regarding lost/found item;
}

/* CLEAR FORM */
function clearForm(){
document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

/* INIT */
render();

</script>

</body>
</html>
